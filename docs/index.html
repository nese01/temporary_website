<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <body>
        <div class="calculator">
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="b number" data-value="7">7</button>
                <button class="b number" data-value="8">8</button>
                <button class="b number" data-value="9">9</button>
                <button class="b equation" data-value="+">+</button>

                <button class="b number" data-value="4">4</button>
                <button class="b number" data-value="5">5</button>
                <button class="b number" data-value="6">6</button>
                <button class="b equation" data-value="-">-</button>

                <button class="b number" data-value="1">1</button>
                <button class="b number" data-value="2">2</button>
                <button class="b number" data-value="3">3</button>
                <button class="b equation" data-value="*">*</button>

                <button class="b clear" data-value="C">C</button>
                <button class="b number" data-value="9">0</button>
                <button class="b equate" data-value="=">=</button>
                <button class="b equation" data-value="/">/</button>
                <script src="script.js"></script>
            </div>
        </div>
    </body>
</html>
